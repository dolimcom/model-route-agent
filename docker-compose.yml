services:
  mysql:
    image: mysql:8.4
    container_name: model-route-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: model_route_agent
      MYSQL_USER: coder
      MYSQL_PASSWORD: coder
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - model-route-mysql:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  model-route-mysql:
