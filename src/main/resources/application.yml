spring:
  application:
    name: model-route-agent
  config:
    import:
      # Local provider profiles only. Do not load shared models.yml at runtime.
      - classpath:models_local.yml
      - optional:classpath:router.yml
  datasource:
    url: jdbc:mysql://localhost:3306/model_route_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: coder
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080

model-route:
  files:
    # Override MODEL_ROUTE_WORKSPACE when the local workspace is elsewhere.
    allowed-roots:
      - id: agent-workspace
        path: ${MODEL_ROUTE_WORKSPACE:D:/project/agent-workspace}
        enabled: true
    max-read-bytes: 1048576
    max-write-bytes: 1048576
