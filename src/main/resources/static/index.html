<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModelRoute Workspace</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="grain"></div>
<header class="masthead">
    <div>
        <p class="eyebrow">MODELROUTE / LOCAL WORKSPACE</p>
        <h1>Workspace Console</h1>
    </div>
    <div class="status-cluster">
        <span class="pulse"></span>
        <span id="statusText">正在连接本地服务</span>
    </div>
</header>

<main class="workspace-shell">
    <aside class="navigator panel">
        <div class="panel-heading">
            <div>
                <span class="step">01</span>
                <h2>文件导航</h2>
            </div>
            <button id="refreshButton" class="icon-button" type="button" title="刷新">↻</button>
        </div>

        <label class="field-label" for="rootSelect">允许根目录</label>
        <select id="rootSelect"></select>

        <label class="field-label" for="directoryPath">当前相对路径</label>
        <div class="path-row">
            <button id="upButton" class="icon-button" type="button" title="返回上级">←</button>
            <input id="directoryPath" value="nested" placeholder="nested">
            <button id="openDirectoryButton" class="small-button" type="button">打开</button>
        </div>

        <div id="entryList" class="entry-list" aria-live="polite"></div>

        <button id="createDirectoryButton" class="outline-button full-width" type="button">
            + 新建目录
        </button>
    </aside>

    <section class="editor panel">
        <div class="panel-heading">
            <div>
                <span class="step">02</span>
                <h2>内容编辑器</h2>
            </div>
            <span id="byteCount" class="byte-count">0 B</span>
        </div>

        <div class="agent-command-card">
            <div class="agent-command-heading">
                <span>AGENT FILE COMMAND</span>
                <span>DAY 10</span>
            </div>
            <label class="field-label" for="agentInstruction">用自然语言描述文件操作</label>
            <textarea id="agentInstruction" class="agent-instruction" spellcheck="false"
                      placeholder="例如：把当前文件改成两行，并在第二行注明由 Agent 更新。"></textarea>
            <button id="planFileOperationButton" class="primary-button full-width" type="button">
                生成操作提案
            </button>
            <p id="agentAnswer" class="agent-answer">选择文件后输入指令，模型生成的操作仍受右侧审批模式控制。</p>
        </div>

        <label class="field-label" for="filePath">文件相对路径</label>
        <input id="filePath" placeholder="nested/example.txt">

        <label class="field-label" for="fileContent">UTF-8 文本内容</label>
        <textarea id="fileContent" spellcheck="false" placeholder="选择文件，或输入新文件内容..."></textarea>

        <div class="action-grid">
            <button id="createFileButton" class="primary-button" type="button">创建文件</button>
            <button id="saveFileButton" class="primary-button accent" type="button">保存修改</button>
            <button id="renameButton" class="outline-button" type="button">重命名</button>
            <button id="deleteButton" class="danger-button" type="button">删除</button>
        </div>
    </section>

    <aside class="approval panel">
        <div class="panel-heading">
            <div>
                <span class="step">03</span>
                <h2>审批队列</h2>
            </div>
            <button id="refreshOperationsButton" class="icon-button" type="button" title="刷新审批队列">↻</button>
        </div>

        <label class="field-label" for="approvalMode">文件操作模式</label>
        <select id="approvalMode">
            <option value="MANUAL">手动审批</option>
            <option value="FULL_ACCESS">全权访问</option>
        </select>
        <p id="approvalHint" class="approval-copy">操作会先进入待审批队列，批准后才会修改文件。</p>

        <div class="queue-heading">
            <span>待审批</span>
            <strong id="pendingCount">0</strong>
        </div>
        <div id="pendingOperations" class="operation-list" aria-live="polite"></div>

        <div class="queue-heading history-heading">
            <span>最近记录</span>
            <button id="rollbackLastButton" class="text-button" type="button">回滚最近操作</button>
        </div>
        <div id="recentOperations" class="operation-list compact" aria-live="polite"></div>

        <div class="preview-card">
            <span>LAST OPERATION</span>
            <strong id="lastOperation">尚无操作</strong>
            <code id="lastOperationPath">—</code>
        </div>
    </aside>
</main>

<div id="toast" class="toast" role="status"></div>
<script src="/app.js" defer></script>
</body>
</html>
