spring:
  config:
    import:
      - classpath:models_test.yml
      - classpath:router.yml
  datasource:
    url: jdbc:h2:mem:model_route_agent;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

model-route:
  files:
    allowed-roots:
      - id: agent-workspace
        path: D:/project/agent-workspace
        enabled: true
