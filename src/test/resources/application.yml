spring:
  main:
    headless: true
  config:
    import:
      - classpath:models_test.yml
      - classpath:router_test.yml
  datasource:
    url: jdbc:h2:mem:model_route_agent;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

semantic:
  router:
    enabled: false

model-route:
  runtime:
    enabled: false
    models-file: ./target/test-runtime/models.local.yml
    workspaces-file: ./target/test-runtime/workspaces.local.yml
    chooser-state-file: ./target/test-runtime/chooser-state.local.yml
  files:
    allowed-roots:
      - id: agent-workspace
        path: D:/project/agent-workspace
        enabled: true
